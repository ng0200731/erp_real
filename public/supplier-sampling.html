<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Sampling - Submit Ready Date</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 640px; width: 100%; }
    .header {
      border-bottom: 2px solid #000;
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; color: #555; margin-top: 4px; }
    .info-section {
      border: 1px solid #000;
      padding: 20px;
      margin-bottom: 24px;
    }
    .info-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #555; }
    .info-value { font-weight: 500; text-align: right; max-width: 60%; }
    .form-section { margin-bottom: 24px; }
    .form-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #000;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      outline: none;
    }
    .form-group input:focus { box-shadow: 0 0 0 1px #000; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }
    .status-msg { text-align: center; padding: 40px 20px; font-size: 15px; }
    .already-submitted {
      border: 1px solid #000;
      padding: 20px;
      margin-bottom: 24px;
      background: #f5f5f5;
      text-align: center;
      font-size: 14px;
    }
    .loading { text-align: center; padding: 60px 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Loading sampling details...</div>
    <div id="error" class="status-msg" style="display:none;"></div>
    <div id="success" class="status-msg" style="display:none;"></div>
    <div id="main" style="display:none;">
      <div class="header">
        <h1>Confirm Sampling</h1>
        <p>Welcome, <span id="supplierName"></span> — <span id="companyName"></span></p>
      </div>
      <div class="info-section">
        <h2>Quotation Details</h2>
        <div id="profileImageSection" style="margin-bottom:16px; display:none;">
          <img id="profileImage" style="max-width:100%; max-height:200px; object-fit:contain; border:1px solid #000;">
        </div>
        <div class="info-row" id="customerItemNameRow" style="display:none;"><span class="info-label">Customer Item</span><span class="info-value" id="customerItemName"></span></div>
        <div class="info-row"><span class="info-label">Customer</span><span class="info-value" id="customerName"></span></div>
        <div class="info-row"><span class="info-label">Product Type</span><span class="info-value" id="productType"></span></div>
        <div id="productDetailsHtml"></div>
        <div class="info-row"><span class="info-label">Quantity</span><span class="info-value" id="quantity"></span></div>
        <div class="info-row"><span class="info-label">OS Ref</span><span class="info-value" id="osRef"></span></div>
      </div>
      <div class="info-section" id="responseTiersSection" style="display:none;">
        <h2>Your Quoted Pricing</h2>
        <table style="width:100%; border-collapse:collapse; font-size:14px;">
          <thead><tr><th style="text-align:left; padding:8px 10px; border:1px solid #000;">Quantity</th><th style="text-align:left; padding:8px 10px; border:1px solid #000;" id="responseTiersPriceHeader">Unit Price (HKD)</th></tr></thead>
          <tbody id="responseTiersBody"></tbody>
        </table>
      </div>
      <div id="alreadySubmitted" class="already-submitted" style="display:none;">
        <p style="font-weight:600; margin-bottom:10px;">You have already submitted the sample ready date.</p>
        <div id="submittedDate"></div>
      </div>
      <form id="submitForm" style="display:none;">
        <div class="form-section">
          <h2>Sample Ready Date</h2>
          <div class="form-group">
            <label for="sampleReadyDate">Expected Sample Ready Date</label>
            <input type="date" id="sampleReadyDate" required>
            <button type="button" onclick="document.getElementById('sampleReadyDate').value = new Date(Date.now() + 14*86400000).toISOString().split('T')[0];" style="margin-top:6px; padding:6px 12px; background:#f5f5f5; border:1px solid #000; font-size:12px; cursor:pointer;">Dummy Date (+14 days)</button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">Submit Sample Ready Date</button>
      </form>
    </div>
  </div>

  <script>
    // Format product type to readable name
    function formatProductType(type) {
      const names = {
        'hang-tag': 'Hang Tag', 'woven-label': 'Woven Label', 'printed-label': 'Printed Label',
        'heat-transfer': 'Heat Transfer', 'silicon-patch': 'Silicon Patch',
        'embroidery-patch': 'Embroidery Patch', 'outsource': 'Outsource', 'other': 'Other', 'others': 'Other'
      };
      return names[type] || type || '-';
    }

    // Friendly labels for product detail keys
    const detailLabels = {
      material: 'Material', size: 'Size', printingMethod: 'Printing Method',
      colorCount: 'Color Count', edgeFinish: 'Edge Finish',
      materialType: 'Material Type', frontColor: 'Front Color', backColor: 'Back Color',
      transferType: 'Transfer Type', application: 'Application Method',
      thickness: 'Thickness', colorMode: 'Color Mode', backingType: 'Backing Type',
      designComplexity: 'Design Complexity',
      stitchType: 'Stitch Type', borderType: 'Border Type', threadColorCount: 'Thread Color Count',
      productDescription: 'Description', category: 'Category', complexity: 'Complexity',
      _productTag: null // hidden internal field
    };

    // Render product details object as HTML info-rows
    function renderProductDetails(details, productType) {
      const container = document.getElementById('productDetailsHtml');
      if (!details || typeof details !== 'object') {
        container.innerHTML = '';
        return;
      }
      let html = '';
      // Show the actual product type if it's an outsource with _productTag
      if (productType === 'outsource' && details._productTag) {
        document.getElementById('productType').textContent = formatProductType(details._productTag);
      }
      for (const [key, value] of Object.entries(details)) {
        if (key.startsWith('_')) continue;
        if (key === 'tiers' || key === 'tierScopeMode') continue; // internal tier config — not a display spec
        if (value === null || value === undefined || value === '') continue;
        if (Array.isArray(value) || (value !== null && typeof value === 'object')) continue; // structured value — skip, never [object Object]
        const label = detailLabels[key] || key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        html += '<div class="info-row"><span class="info-label">' + label + '</span><span class="info-value">' + value + '</span></div>';
      }
      container.innerHTML = html;
    }

    const token = window.location.pathname.split('/supplier-sampling/')[1]?.split('/')[0];

    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Invalid link. No token provided.';
    } else {
      loadSampling();
    }

    async function loadSampling() {
      try {
        const res = await fetch(`/api/supplier-portal/sampling/${token}`);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if (!data.success) {
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = data.error || 'Unable to load sampling details.';
          return;
        }

        document.getElementById('main').style.display = 'block';
        document.getElementById('supplierName').textContent = data.supplier.memberName;
        document.getElementById('companyName').textContent = data.supplier.companyName;
        document.getElementById('customerName').textContent = data.quotation.customerName || '-';
        document.getElementById('productType').textContent = formatProductType(data.quotation.productType) || '-';
        document.getElementById('quantity').textContent = data.quotation.quantity || '-';
        document.getElementById('osRef').textContent = data.quotation.outsourcingSeq || '-';

        // Update the price header with the quotation's currency
        const priceHeader = document.getElementById('responseTiersPriceHeader');
        if (priceHeader) {
          priceHeader.textContent = 'Unit Price (' + (data.quotation.currency || 'HKD') + ')';
        }

        // Show customer item name if available
        if (data.quotation.customerItemName) {
          document.getElementById('customerItemNameRow').style.display = 'flex';
          document.getElementById('customerItemName').textContent = data.quotation.customerItemName;
        }

        // Render product details as HTML
        renderProductDetails(data.quotation.productDetails, data.quotation.productType);

        // Render the supplier's previously-submitted pricing tiers (last submitted price)
        if (data.response && Array.isArray(data.response.tiers) && data.response.tiers.length > 0) {
          const tiersHtml = data.response.tiers.map(function (t) {
            return '<tr><td style="padding:8px 10px; border:1px solid #000;">' + Number(t.quantity || 0) + '</td><td style="padding:8px 10px; border:1px solid #000;">' + Number(t.unitPrice || 0).toFixed(2) + '</td></tr>';
          }).join('');
          document.getElementById('responseTiersSection').style.display = 'block';
          document.getElementById('responseTiersBody').innerHTML = tiersHtml;
        }

        // Show profile image if available
        if (data.quotation.hasProfileImage) {
          document.getElementById('profileImageSection').style.display = 'block';
          document.getElementById('profileImage').src = `/api/quotations/${data.quotation.id}/profile-image`;
        }

        if (data.alreadySubmitted) {
          document.getElementById('alreadySubmitted').style.display = 'block';
          if (data.quotation.sampleReadyDate) {
            document.getElementById('submittedDate').textContent = 'Sample Ready Date: ' + data.quotation.sampleReadyDate;
          }
        } else {
          document.getElementById('submitForm').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Failed to connect to server.';
      }
    }

    document.getElementById('submitForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const res = await fetch(`/api/supplier-portal/sampling/${token}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sampleReadyDate: document.getElementById('sampleReadyDate').value
          })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('main').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          document.getElementById('success').textContent = 'Thank you! Sample ready date has been submitted successfully.';
        } else {
          btn.disabled = false;
          btn.textContent = 'Submit Sample Ready Date';
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Submit Sample Ready Date';
      }
    });
  </script>
</body>
</html>
