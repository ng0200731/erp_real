<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Sampling - Submit Ready Date</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 640px; width: 100%; }
    .header {
      border-bottom: 2px solid #000;
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; color: #555; margin-top: 4px; }
    .info-section {
      border: 1px solid #000;
      padding: 20px;
      margin-bottom: 24px;
    }
    .info-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #555; }
    .info-value { font-weight: 500; text-align: right; max-width: 60%; }
    .form-section { margin-bottom: 24px; }
    .form-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #000;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      outline: none;
    }
    .form-group input:focus { box-shadow: 0 0 0 1px #000; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }
    .status-msg { text-align: center; padding: 40px 20px; font-size: 15px; }
    .already-submitted {
      border: 1px solid #000;
      padding: 20px;
      margin-bottom: 24px;
      background: #f5f5f5;
      text-align: center;
      font-size: 14px;
    }
    .loading { text-align: center; padding: 60px 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Loading sampling details...</div>
    <div id="error" class="status-msg" style="display:none;"></div>
    <div id="success" class="status-msg" style="display:none;"></div>
    <div id="main" style="display:none;">
      <div class="header">
        <h1>Confirm Sampling</h1>
        <p>Welcome, <span id="supplierName"></span> — <span id="companyName"></span></p>
      </div>
      <div class="info-section">
        <h2>Quotation Details</h2>
        <div class="info-row"><span class="info-label">Customer</span><span class="info-value" id="customerName"></span></div>
        <div class="info-row"><span class="info-label">Product Type</span><span class="info-value" id="productType"></span></div>
        <div class="info-row"><span class="info-label">Quantity</span><span class="info-value" id="quantity"></span></div>
        <div class="info-row"><span class="info-label">OS Ref</span><span class="info-value" id="osRef"></span></div>
      </div>
      <div id="alreadySubmitted" class="already-submitted" style="display:none;">
        <p style="font-weight:600; margin-bottom:10px;">You have already submitted the sample ready date.</p>
        <div id="submittedDate"></div>
      </div>
      <form id="submitForm" style="display:none;">
        <div class="form-section">
          <h2>Sample Ready Date</h2>
          <div class="form-group">
            <label for="sampleReadyDate">Expected Sample Ready Date</label>
            <input type="date" id="sampleReadyDate" required>
            <button type="button" onclick="document.getElementById('sampleReadyDate').value = new Date(Date.now() + 14*86400000).toISOString().split('T')[0];" style="margin-top:6px; padding:6px 12px; background:#f5f5f5; border:1px solid #000; font-size:12px; cursor:pointer;">Dummy Date (+14 days)</button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">Submit Sample Ready Date</button>
      </form>
    </div>
  </div>

  <script>
    const token = window.location.pathname.split('/supplier-sampling/')[1]?.split('/')[0];

    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Invalid link. No token provided.';
    } else {
      loadSampling();
    }

    async function loadSampling() {
      try {
        const res = await fetch(`/api/supplier-portal/sampling/${token}`);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if (!data.success) {
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = data.error || 'Unable to load sampling details.';
          return;
        }

        document.getElementById('main').style.display = 'block';
        document.getElementById('supplierName').textContent = data.supplier.memberName;
        document.getElementById('companyName').textContent = data.supplier.companyName;
        document.getElementById('customerName').textContent = data.quotation.customerName || '-';
        document.getElementById('productType').textContent = data.quotation.productType || '-';
        document.getElementById('quantity').textContent = data.quotation.quantity || '-';
        document.getElementById('osRef').textContent = data.quotation.outsourcingSeq || '-';

        if (data.alreadySubmitted) {
          document.getElementById('alreadySubmitted').style.display = 'block';
          if (data.quotation.sampleReadyDate) {
            document.getElementById('submittedDate').textContent = 'Sample Ready Date: ' + data.quotation.sampleReadyDate;
          }
        } else {
          document.getElementById('submitForm').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Failed to connect to server.';
      }
    }

    document.getElementById('submitForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const res = await fetch(`/api/supplier-portal/sampling/${token}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sampleReadyDate: document.getElementById('sampleReadyDate').value
          })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('main').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          document.getElementById('success').textContent = 'Thank you! Sample ready date has been submitted successfully.';
        } else {
          alert(data.error || 'Submission failed. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Submit Sample Ready Date';
        }
      } catch (err) {
        alert('Failed to connect to server. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Submit Sample Ready Date';
      }
    });
  </script>
</body>
</html>
